name: cab_booking_manager
description: "Cab Booking Management System"

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.5

  # Navigation
  go_router: ^16.0.0

  # Date & Time Formatting
  intl: ^0.20.2

  # Toast Messages
  fluttertoast: ^8.2.12

  # Local App Settings
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/